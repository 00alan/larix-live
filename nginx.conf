# nginx.conf
worker_processes 1;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;  # Default RTMP port

        application live {
            live on;
            # record off;  # Optionally disable recording

            # Enable HLS with ~60s delay
            hls on;
            hls_path /tmp/hls;
            hls_fragment 6s;
            hls_playlist_length 60s;
        }
    }
}

http {
    sendfile off;
    default_type application/octet-stream;

    server {
        listen 8080;
        server_name localhost;

        # HLS playback
        location /live/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias /tmp/hls/;
            add_header Cache-Control no-cache;
        }
    }
}
